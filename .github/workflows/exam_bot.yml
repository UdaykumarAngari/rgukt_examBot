name: RGUKT Exam Bot Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
        run: |
          python exam_bot.py

      - name: Commit Updated JSON
        run: |
          git config user.name "RGUKT Exam Bot"
          git config user.email "bot@rgukt.local"

          git add sent_notices.json

          git diff --staged --quiet || git commit -m "Update sent notices"

          git push
